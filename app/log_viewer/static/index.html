<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LifeOps Log Viewer</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <header class="brand">
          <div class="brand-mark">L</div>
          <div>
            <h1>LifeOps</h1>
            <p>Agent Log Viewer</p>
          </div>
        </header>
        <label class="search-box compact-filter">
          <span>来源</span>
          <select id="source-filter">
            <option value="all">全部日志</option>
            <option value="application">普通运行</option>
            <option value="uat">验收测试</option>
            <option value="legacy">历史日志</option>
          </select>
        </label>
        <label class="search-box compact-filter">
          <span>测试运行</span>
          <select id="run-filter">
            <option value="all">全部测试运行</option>
          </select>
        </label>
        <label class="search-box">
          <span>会话</span>
          <input id="session-search" type="search" placeholder="搜索会话…">
        </label>
        <div id="session-list" class="session-list"></div>
      </aside>

      <main class="main-panel">
        <header class="toolbar">
          <div>
            <p class="eyebrow">CURRENT SESSION</p>
            <h2 id="session-title">选择一个会话</h2>
            <p id="session-meta" class="session-meta">三类日志会在这里按会话配对显示</p>
          </div>
          <div class="kind-switch" role="tablist" aria-label="日志类型">
            <button class="kind-button active" data-kind="events" role="tab">Events</button>
            <button class="kind-button" data-kind="llm" role="tab">LLM I/O</button>
            <button class="kind-button" data-kind="application" role="tab">Application</button>
          </div>
        </header>

        <section class="filters">
          <label>
            <span>事件类型</span>
            <select id="event-filter">
              <option value="">全部事件</option>
            </select>
          </label>
          <label class="content-search">
            <span>内容搜索</span>
            <input id="content-search" type="search" placeholder="工具名、Skill、错误…">
          </label>
          <button id="toggle-all" class="secondary-button">全部展开</button>
          <button id="refresh" class="secondary-button">刷新</button>
        </section>

        <section id="summary" class="summary-grid" aria-live="polite"></section>
        <section id="events" class="events">
          <div class="empty-state">
            <div class="empty-icon">{ }</div>
            <h3>还没有选择日志</h3>
            <p>从左侧选择一次会话开始查看。</p>
          </div>
        </section>
      </main>
    </div>
    <script src="/app.js" defer></script>
  </body>
</html>
